<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The new guest? Welcome!</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/log-reg.css') }}">
</head>
<body>
    <div class="form-container">
        <img src="{{ url_for('static', filename='img/tf2.gif') }}" alt="logo gif" class="form-logo">
        <h1>Sign up</h1>
        
        <form action="/register" method="POST">
            <div class="form-group">
                <label for="login">Login:</label>
                <input type="text" id="login" name="login" required>
            </div>
            
            <div class="form-group">
                <label for="pass1">New password:</label>
                <input type="password" id="pass1" name="pass1" required>
            </div>
            
            <div class="form-group">
                <label for="pass2">Confirm the new password:</label>
                <input type="password" id="pass2" name="pass2" required>
            </div>
            
            <button type="submit" class="submit-btn">Sign up</button>
        </form>

        {% if errors %}
            <div class="error-box">
                {% for error in errors %}
                    <p class="error-msg">{{ error }}</p>
                {% endfor %}
            </div>
        {% endif %}

        <div class="form-footer">
            <a href="/login">I have an account, take me back</a>
        </div>
    </div>
</body>
</html>
