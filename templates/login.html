<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вход</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='log-reg.css') }}">
</head>
<body>
    <img src="{{ url_for('static', filename='img/tf2.gif') }}" alt="logo gif" width=64 height=64>
    <h1>Sign in</h1>
    <form class="labels" action="/login" method="POST">
        <div>
            <label for="">Логин:</label>
            <input type="text" name="login">
        </div>
        <div>
            <label for="">Пароль:</label>
            <input type="password" name="password">
        </div>
        <div>
            <input type="submit" value="Войти">
        </div>
    </form>
    <div class="error">
        {% for error in errors %}
        <p>{{ error }}</p>
        {% endfor %}
    </div>
</body>
</html>
