<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Your Achievements</title>
    <style>
        body { 
            background-color: rgb(57, 52, 46); 
            font-family: sans-serif; 
            color: #ebe2ca; 
            padding: 40px; 
        }
        .container { 
            max-width: 800px; 
            margin: 0 auto; 
        }
        h1 { 
            color: #ba550e; 
            margin-bottom: 30px; 
            text-transform: uppercase; 
        }
        .back-link { 
            color: #ba550e; 
            text-decoration: none; 
            font-weight: bold; 
            display: inline-block; 
            margin-bottom: 20px; 
        }
        .back-link:hover { 
            text-decoration: underline; 
        }
        .achievement-card { 
            background: #3c352e; 
            border: 3px solid #5a5245; 
            padding: 20px; 
            margin-bottom: 15px; 
            display: flex; 
            align-items: center; 
            gap: 20px; 
        }
        .achievement-card.unlocked { 
            border-color: #5b7a3a; 
        }
        .status-badge { 
            padding: 5px 10px; 
            font-size: 12px; 
            font-weight: bold; 
            text-transform: uppercase; 
            color: white; 
        }
        .status-badge.locked { 
            background: #b83838; 
        }
        .status-badge.unlocked { 
            background: #5b7a3a; 
        }
        .ach-info h2 { 
            font-size: 18px; 
            color: white; 
            margin-bottom: 5px; 
        }
        .ach-info p { 
            font-size: 14px; 
            color: #a49a83; 
        }
    </style>
</head>
<body>
    <div class="container">
        <a href="/" class="back-link">← Back to Main</a>
        <h1>{{ username }}'s Achievements</h1>

        {% for ach in achievements %}
            {% if ach[3] == 1 %}
                <div class="achievement-card unlocked">
                    <span class="status-badge unlocked">Unlocked</span>
                    <div class="ach-info">
                        <h2>{{ ach[1] }}</h2>
                        <p>{{ ach[2] }}</p>
                    </div>
                </div>
            {% else %}
                <div class="achievement-card">
                    <span class="status-badge locked">Locked</span>
                    <div class="ach-info">
                        <h2>{{ ach[1] }}</h2>
                        <p>{{ ach[2] }}</p>
                    </div>
                </div>
            {% endif %}
        {% endfor %}
    </div>
</body>
</html>
