<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Your Achievements</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background-color: rgb(57, 52, 46); font-family: sans-serif; color: #ebe2ca; }
        header { background-color: rgb(37, 35, 36); padding: 30px 20px; display: flex; justify-content: space-between; align-items: center; border-bottom: 5px solid #ba550e; }
        header h1 { color: rgb(186, 85, 14); text-transform: uppercase; letter-spacing: 1px; }
        .back-btn { background: #5a5245; color: white; padding: 10px 20px; text-decoration: none; font-weight: bold; text-transform: uppercase; border: 2px solid #2b2622; }
        .back-btn:hover { background: #ba550e; }
        .achievements-container { max-width: 800px; margin: 40px auto; background: #2b2622; padding: 30px; border: 8px solid #5a5245; }
        .ach-row { display: flex; background: #3c352e; border: 3px solid #ba550e; margin-bottom: 15px; padding: 15px; align-items: center; }
        /* Стиль для заблокированной ачивки */
        .ach-row.locked { border-color: #5a5245; background: #26211d; opacity: 0.5; }
        .ach-status { font-weight: bold; text-transform: uppercase; padding: 5px 10px; font-size: 12px; margin-right: 20px; border: 2px solid; }
        .ach-status.unlocked { color: #5b7a3a; border-color: #5b7a3a; }
        .ach-status.locked-status { color: #b83838; border-color: #b83838; }
        .ach-info h2 { font-size: 20px; text-transform: uppercase; color: #ebe2ca; margin-bottom: 5px; }
        .ach-info p { font-size: 14px; color: #b5ad99; }
    </style>
</head>
<body>
    <header>
        <h1>{{ username }}'s Achievements</h1>
        <a href="/" class="back-btn">Back to Main</a>
    </header>

    <main>
        <div class="achievements-container">
            {% for ach in achievements %}
                <!-- ach[3] — это флаг unlocked (1 или 0) -->
                {% if ach[3] == 1 %}
                    <div class="ach-row">
                        <div class="ach-status unlocked">Unlocked</div>
                        <div class="ach-info">
                            <h2>{{ ach[1] }}</h2> <!-- Название -->
                            <p>{{ ach[2] }}</p> <!-- Описание -->
                        </div>
                    </div>
                {% else %}
                    <div class="ach-row locked">
                        <div class="ach-status locked-status">Locked</div>
                        <div class="ach-info">
                            <h2>{{ ach[1] }}</h2>
                            <p>{{ ach[2] }}</p>
                        </div>
                    </div>
                {% endif %}
            {% endfor %}
        </div>
    </main>
</body>
</html>
